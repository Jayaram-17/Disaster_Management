{% extends 'core/layout.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
        <h2><i class="fa-solid fa-user-lock" style="color: var(--primary-color);"></i> Access Portal</h2>
        <form method="POST" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
            {% csrf_token %}
            {% if form.errors %}
                <div style="color: var(--accent-color); font-size: 0.9rem; background: rgba(239, 68, 68, 0.1); padding: 0.5rem; border-radius: 0.5rem;">
                    Invalid username or password.
                </div>
            {% endif %}
            
            <div style="text-align: left;">
                <label style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.3rem; display: block;">Username</label>
                <input type="text" name="username" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none;" required>
            </div>
            
            <div style="text-align: left;">
                <label style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.3rem; display: block;">Password</label>
                <input type="password" name="password" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none;" required>
            </div>

            <button type="submit" style="background: var(--primary-color); color: white; padding: 0.8rem; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.3s; margin-top: 0.5rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
