{% extends 'core/layout.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; text-align: center;">
        <h2><i class="fa-solid fa-user-plus" style="color: var(--primary-color);"></i> Sign Up</h2>
        <form method="POST" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; text-align: left;">
            {% csrf_token %}
            
            {% for field in form %}
            <div style="margin-bottom: 0.5rem;">
                <label style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.3rem; display: block;">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <small style="color: #94a3b8; font-size: 0.75rem; display: block; margin-top: 0.2rem;">{{ field.help_text }}</small>
                {% endif %}
                {% for error in field.errors %}
                    <small style="color: var(--accent-color); font-size: 0.8rem;">{{ error }}</small>
                {% endfor %}
            </div>
            {% endfor %}

            <button type="submit" style="background: var(--primary-color); color: white; padding: 0.8rem; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.3s; margin-top: 0.5rem;">
                Create Account
            </button>
        </form>
    </div>
</div>
<style>
    /* Force inputs rendered by django form to match design */
    input[type="text"], input[type="password"] {
        width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); 
        background: rgba(0,0,0,0.2) !important; color: white !important; outline: none;
    }
</style>
{% endblock %}
